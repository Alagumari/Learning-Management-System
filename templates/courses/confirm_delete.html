{% extends 'base.html' %}
{% block title %}Delete Course – EduLearn{% endblock %}
{% block content %}
<div class="container py-5"><div class="row justify-content-center"><div class="col-lg-5"><div class="card p-5 text-center"><div style="font-size:4rem;color:var(--danger);">⚠️</div><h3 class="fw-bold mt-2 mb-1">Delete Course?</h3><p class="text-muted mb-4">Are you sure you want to delete <strong>"{{ course.title }}"</strong>? This action cannot be undone and all associated data will be lost.</p><form method="post" class="d-flex gap-2 justify-content-center">{% csrf_token %}<button type="submit" class="btn btn-danger fw-bold px-4"><i class="bi bi-trash me-1"></i>Yes, Delete</button><a href="/courses/{{ course.slug }}/" class="btn btn-outline-secondary px-4">Cancel</a></form></div></div></div></div>
{% endblock %}
