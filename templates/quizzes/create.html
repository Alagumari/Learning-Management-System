{% extends 'base.html' %}
{% block title %}Create Quiz – EduLearn{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <h2 class="fw-bold mb-4">Create Quiz for "{{ module.title }}"</h2>
      <div class="card p-4">
        <form method="post" data-validate>
          {% csrf_token %}
          <div class="mb-3"><label class="form-label">Quiz Title *</label><input name="title" class="form-control" required placeholder="e.g. Module 1 Assessment"></div>
          <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
          <div class="row g-3 mb-4">
            <div class="col-md-4"><label class="form-label">Time Limit (min)</label><input type="number" name="time_limit" class="form-control" value="0" min="0"><div class="form-text">0 = No limit</div></div>
            <div class="col-md-4"><label class="form-label">Pass Score (%)</label><input type="number" name="pass_score" class="form-control" value="70" min="0" max="100"></div>
            <div class="col-md-4"><label class="form-label">Max Attempts</label><input type="number" name="max_attempts" class="form-control" value="3" min="1"></div>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-bold">Create Quiz & Add Questions</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
